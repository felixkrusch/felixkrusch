<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#ffffff"/>
  <!-- Grid overlay texture -->
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#e5e5e5" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <!-- Name -->
  <text x="80" y="260" font-family="Arial Black, Arial, sans-serif" font-size="220" font-weight="900" fill="#121212" letter-spacing="-8">Felix</text>
  <!-- Red accent dot -->
  <circle cx="893" cy="225" r="22" fill="#ff000d"/>
  <!-- Divider line -->
  <rect x="80" y="310" width="1040" height="2" fill="#121212"/>
  <!-- Subtitle -->
  <text x="80" y="375" font-family="Arial, sans-serif" font-size="22" fill="#666666" letter-spacing="6">WEB DESIGNER &amp; DEVELOPER</text>
  <!-- Tagline -->
  <text x="80" y="430" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="#121212">Modern, fast websites that bring in more clients.</text>
  <!-- Location + URL -->
  <text x="80" y="490" font-family="Arial, sans-serif" font-size="20" fill="#666666" letter-spacing="3">MONTREAL · SINCE 1998</text>
  <text x="80" y="570" font-family="Arial, sans-serif" font-size="22" fill="#ff000d" letter-spacing="2">felixkrusch.com</text>
</svg>
